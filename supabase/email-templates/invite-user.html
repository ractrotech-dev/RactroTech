<!--
  Supabase → Authentication → Email Templates → Invite user

  Subject: You're invited to RactroTech

  Variables: {{ .ConfirmationURL }}, {{ .SiteURL }}, {{ .Email }}
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're invited</title>
</head>
<body style="margin:0;padding:0;background-color:#facc15;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#facc15;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:520px;">
          <tr>
            <td style="background-color:#f4f4f5;border:4px solid #000000;padding:24px;">
              <p style="margin:0 0 8px;font-size:10px;font-weight:900;letter-spacing:0.3em;color:rgba(0,0,0,0.4);text-align:center;text-transform:uppercase;">RactroTech</p>
              <h1 style="margin:0 0 16px;font-size:22px;font-weight:900;text-align:center;text-transform:uppercase;color:#000000;">
                You're invited
              </h1>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td style="background-color:#efefef;border:4px solid #000000;padding:20px;text-align:center;">
                    <p style="margin:0 0 20px;font-size:14px;font-weight:600;line-height:1.6;color:rgba(0,0,0,0.85);">
                      You've been invited to join RactroTech. Accept the invite for <strong>{{ .Email }}</strong>.
                    </p>
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;background-color:#000000;color:#facc15;font-size:13px;font-weight:900;text-decoration:none;text-transform:uppercase;letter-spacing:0.15em;border:4px solid #000000;">
                      Accept invite
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
