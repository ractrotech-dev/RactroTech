<!--
  Supabase → Authentication → Email Templates → Change email address

  Subject: Confirm your new RactroTech email

  Variables: {{ .ConfirmationURL }}, {{ .SiteURL }}, {{ .Email }}
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm email change</title>
</head>
<body style="margin:0;padding:0;background-color:#facc15;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#facc15;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:520px;background-color:#ffffff;border:4px solid #000000;">
          <tr>
            <td style="padding:24px;border-bottom:4px solid #000000;text-align:center;">
              <img src="{{ .SiteURL }}/logo.png" alt="RactroTech" width="48" height="48" style="display:block;margin:0 auto;border:0;" />
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <h1 style="margin:0 0 12px;font-size:20px;font-weight:900;text-transform:uppercase;text-align:center;color:#000000;">Confirm new email</h1>
              <p style="margin:0 0 20px;font-size:14px;font-weight:600;line-height:1.6;color:rgba(0,0,0,0.85);text-align:center;">
                Confirm <strong>{{ .Email }}</strong> as your new RactroTech account email.
              </p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;background-color:#000000;color:#facc15;font-size:13px;font-weight:900;text-decoration:none;text-transform:uppercase;letter-spacing:0.15em;border:4px solid #000000;">
                      Confirm email
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
